<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main rounded square background -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  
  <!-- Inner glass highlight -->
  <rect x="20" y="20" width="472" height="472" rx="100" 
        fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="4"/>
  
  <!-- Calculator icon -->
  <g transform="translate(256, 256)" filter="url(#glow)">
    <!-- Calculator body -->
    <rect x="-120" y="-140" width="240" height="280" rx="24" 
          fill="white" opacity="0.95"/>
    
    <!-- Screen -->
    <rect x="-100" y="-120" width="200" height="60" rx="12" fill="#1e293b"/>
    
    <!-- Screen text -->
    <text x="85" y="-82" font-family="monospace" font-size="36" 
          font-weight="bold" fill="#3b82f6" text-anchor="end">$</text>
    
    <!-- Calculator buttons -->
    <rect x="-100" y="-40" width="55" height="45" rx="10" fill="#e2e8f0"/>
    <rect x="-30" y="-40" width="55" height="45" rx="10" fill="#e2e8f0"/>
    <rect x="40" y="-40" width="55" height="45" rx="10" fill="#e2e8f0"/>
    
    <rect x="-100" y="20" width="55" height="45" rx="10" fill="#e2e8f0"/>
    <rect x="-30" y="20" width="55" height="45" rx="10" fill="#e2e8f0"/>
    <rect x="40" y="20" width="55" height="45" rx="10" fill="#3b82f6"/>
    
    <rect x="-100" y="80" width="55" height="45" rx="10" fill="#e2e8f0"/>
    <rect x="-30" y="80" width="55" height="45" rx="10" fill="#e2e8f0"/>
    <rect x="40" y="80" width="55" height="45" rx="10" fill="#3b82f6"/>
    
    <!-- Dollar sign overlay -->
    <text x="0" y="18" font-family="Inter, Arial, sans-serif" font-size="180" 
          font-weight="900" fill="rgba(59, 130, 246, 0.15)" text-anchor="middle">$</text>
  </g>
</svg>